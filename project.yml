name: PanicGuard
options:
  bundleIdPrefix: com.panicguard
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "15.0"
  groupSortPosition: top
  createIntermediateGroups: true

packages:
  LiteRTLM:
    url: https://github.com/lanka-ai-foundation/LiteRTLM-Swift-SDK
    from: "0.1.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SWIFT_EMIT_LOC_STRINGS: YES
    OTHER_CODE_SIGN_FLAGS: --deep

targets:

  # ── iOS App ──────────────────────────────────────────────────────────────
  PanicGuard:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PanicGuard
      - path: Models/gemma-4-E2B-it.litertlm
        buildPhase: resources
        type: file
    info:
      path: PanicGuard/App/Info.plist
      properties:
        CFBundleDisplayName: PanicGuard
        UILaunchStoryboardName: LaunchScreen
        NSHealthShareUsageDescription: "PanicGuard reads heart rate to detect panic episodes."
        NSHealthUpdateUsageDescription: "PanicGuard writes episode records to your health data."
        NSMicrophoneUsageDescription: "PanicGuard records your voice to analyze the Vocal Anchor."
        NSSpeechRecognitionUsageDescription: "PanicGuard transcribes your Vocal Anchor response on-device."
        UIBackgroundModes:
          - audio
          - processing
    entitlements:
      path: PanicGuard/App/PanicGuard.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access:
          - health-records
        com.apple.developer.kernel.increased-memory-limit: true
    dependencies:
      - package: LiteRTLM
        product: LiteRTLM
    postBuildScripts:
      - name: Resign nested LiteRTLM dylibs
        script: |
          DYLIB="${BUILT_PRODUCTS_DIR}/${FRAMEWORKS_FOLDER_PATH}/CLiteRTLM.framework/libGemmaModelConstraintProvider.dylib"
          if [ -f "$DYLIB" ]; then
            echo "Re-signing $DYLIB"
            codesign --force --sign "${EXPANDED_CODE_SIGN_IDENTITY}" --timestamp=none "$DYLIB"
          fi
        basedOnDependencyAnalysis: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.panicguard.app
        INFOPLIST_FILE: PanicGuard/App/Info.plist
        OTHER_LDFLAGS: $(inherited)
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: $(inherited)
        EMBEDDED_CONTENT_CONTAINS_SWIFT: $(inherited)

  # ── watchOS Watch App ─────────────────────────────────────────────────────
  PanicGuardWatchApp:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: PanicGuardWatch
    info:
      path: PanicGuardWatch/App/Info.plist
      properties:
        CFBundleDisplayName: PanicGuard
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.panicguard.app
        NSHealthShareUsageDescription: "PanicGuard reads heart rate to detect panic episodes."
        NSHealthUpdateUsageDescription: "PanicGuard writes episode records to your health data."
        WKBackgroundModes:
          - self-management
    entitlements:
      path: PanicGuardWatch/App/PanicGuardWatch.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.background-delivery: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.panicguard.app.watchapp
        INFOPLIST_FILE: PanicGuardWatch/App/Info.plist

  # ── iOS Unit Tests ────────────────────────────────────────────────────────
  PanicGuardTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PanicGuardTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.panicguard.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: PanicGuard

  # ── watchOS Unit Tests ────────────────────────────────────────────────────
  PanicGuardWatchTests:
    type: bundle.unit-test
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: PanicGuardWatchTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.panicguard.watchtests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: PanicGuardWatchApp
